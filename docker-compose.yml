version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: file-uploader-server
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: file-uploader-client
    depends_on:
      - server
    ports:
      - "5173:80"
    restart: unless-stopped
