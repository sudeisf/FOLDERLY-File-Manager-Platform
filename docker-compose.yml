version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: file-uploader-server
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /
    container_name: file-uploader-client
    depends_on:
      - server
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: file-uploader-nginx
    depends_on:
      - client
      - server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
